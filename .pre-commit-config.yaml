repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
      - id: ruff-format
  - repo: local
    hooks:
      - id: validate-heroes
        name: validate heroes.json
        entry: python backend/app/validate_data.py
        language: system
        files: ^data/heroes\.json$
